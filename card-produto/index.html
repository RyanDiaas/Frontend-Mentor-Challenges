<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Perfume</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <main>
        <img src="./assets/imgProdutoDesktop.jpg" alt="Perfume CHANEL" class="imagemPrincipal">

        <section class="secaoTexto">
            <p class="tituloAuxiliar">P E R F U M E</p>
            <h1 class="tituloPrincipal">Gabrielle Essence Eau De Parfum</h1>
            <p class="paragrafo">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
            <div class="precos">
                <span class="precoNovo">$149.99</span>
                <p class="precoAntigo">$169.99</p>
            </div>
            <button class="botao"><img src="./assets/icon-cart.svg" alt="imagem de um carrinho supermercado" class="carrinho"> Add to Cart</button>
        </section>
    </main>    

</body>

</html>
